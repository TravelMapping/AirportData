name: Update Homepage Data

on:
  push:
    branches:
      - master # Triggers automation whenever code is pushed to master
  pull_request:
    branches:
      - master # Triggers automation whenever a pull request is merged

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python on the automated runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

# 3. Run the script your friend wrote
    - name: Run homepage data generator
      run: |
        cd air/scripts
        python generate_homepage_data.py

    # 4. Save and commit the newly updated json file back to the repo
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data/homepage_data.json
        git diff-index --quiet HEAD || git commit -m "Automated homepage statistics update [skip ci]"
        git push
